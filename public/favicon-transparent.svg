<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F1D8" />
      <stop offset="25%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#AA7C11" />
      <stop offset="75%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#F9F1D8" />
    </linearGradient>
    <linearGradient id="gold-pin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F9F1D8" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- V Road Base -->
  <path d="M 120 160 L 256 410 L 392 160" 
        fill="none" 
        stroke="url(#gold)" 
        stroke-width="84" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#shadow)" />

  <!-- Dashed Line (Road Markings) -->
  <path d="M 120 160 L 256 410 L 392 160" 
        fill="none" 
        stroke="#050505" 
        stroke-width="16" 
        stroke-dasharray="40 40" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Location Pin -->
  <g filter="url(#shadow)">
    <path d="M 256 120 C 230 120, 210 140, 210 166 C 210 205, 256 260, 256 260 C 256 260, 302 205, 302 166 C 302 140, 282 120, 256 120 Z" 
          fill="url(#gold-pin)" />
    <!-- Pin Hole -->
    <circle cx="256" cy="166" r="14" fill="#050505" />
  </g>
</svg>